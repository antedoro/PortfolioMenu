<div id="portfolio-dashboard"
hx-get="/dashboard"
hx-trigger="every 300s"
hx-swap="outerHTML">


<div class="grid grid-cols-1 md:grid-cols-4 gap-5 mb-8">


<div class="bg-white dark:bg-gray-800 rounded-xl shadow p-5">

<p>
Valore Portfolio
</p>

<h2 class="text-3xl font-bold">

{{printf "%.2f" .TotalValue}} €

</h2>

</div>



<div class="bg-white dark:bg-gray-800 rounded-xl shadow p-5">

<p>
Investito
</p>

<h2 class="text-3xl font-bold">

{{printf "%.2f" .TotalInvested}} €

</h2>

</div>



<div class="bg-white dark:bg-gray-800 rounded-xl shadow p-5">

<p>
Gain/Loss
</p>

<h2 class="text-3xl font-bold">

{{printf "%.2f" .TotalGain}} €

</h2>

</div>



<div class="bg-white dark:bg-gray-800 rounded-xl shadow p-5">

<p>
Performance
</p>

<h2 class="text-3xl font-bold">

{{printf "%.2f" .GainPercent}} %

</h2>

</div>


</div>


</div>
